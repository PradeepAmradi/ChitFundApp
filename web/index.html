<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChitFund Management</title>
    <link rel="stylesheet" href="css/styles.css?v=2.3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Loading state -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading ChitFund App...</p>
        </div>

        <!-- Login Section -->
        <div id="login-section" class="section hidden">
            <div class="container">
                <div class="login-card">
                    <div class="logo">
                        <i class="fas fa-coins"></i>
                        <h1>ChitFund Management</h1>
                    </div>
                    
                    <div id="login-form">
                        <h2>Login</h2>
                        <form id="loginForm">
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" required>
                            </div>
                            <button type="submit" id="send-otp-btn" class="btn btn-primary">
                                <span class="btn-text">Send OTP</span>
                                <span class="btn-loading hidden">
                                    <i class="fas fa-spinner fa-spin"></i> Sending...
                                </span>
                            </button>
                        </form>

                        <div class="oauth-divider">
                            <span>or sign in with</span>
                        </div>

                        <div class="oauth-buttons" id="oauth-buttons">
                            <button class="btn btn-oauth btn-google" id="google-signin-btn" onclick="authManager.handleOAuthLogin('google')">
                                <svg class="oauth-icon" viewBox="0 0 24 24" width="20" height="20">
                                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                </svg>
                                <span>Google</span>
                            </button>
                            <button class="btn btn-oauth btn-microsoft" id="microsoft-signin-btn" onclick="authManager.handleOAuthLogin('microsoft')">
                                <svg class="oauth-icon" viewBox="0 0 24 24" width="20" height="20">
                                    <path fill="#F25022" d="M1 1h10v10H1z"/>
                                    <path fill="#00A4EF" d="M1 13h10v10H1z"/>
                                    <path fill="#7FBA00" d="M13 1h10v10H13z"/>
                                    <path fill="#FFB900" d="M13 13h10v10H13z"/>
                                </svg>
                                <span>Microsoft</span>
                            </button>
                        </div>
                    </div>
                    
                    <div id="otp-form" class="hidden">
                        <h2>Verify OTP</h2>
                        <p id="otp-message"></p>
                        <form id="otpForm">
                            <div class="form-group">
                                <label for="otp">Enter 6-digit OTP</label>
                                <input type="text" id="otp" name="otp" maxlength="6" required>
                            </div>
                            <button type="submit" id="verify-otp-btn" class="btn btn-primary">
                                <span class="btn-text">Verify OTP</span>
                                <span class="btn-loading hidden">
                                    <i class="fas fa-spinner fa-spin"></i> Verifying...
                                </span>
                            </button>
                            <button type="button" class="btn btn-secondary" id="back-to-login">
                                <i class="fas fa-arrow-left"></i> Back to Email
                            </button>
                        </form>
                    </div>
                    
                    <div id="error-message" class="error-message hidden"></div>
                    <div id="success-message" class="success-message hidden"></div>
                </div>
            </div>
        </div>

        <!-- Main App Section -->
        <div id="main-section" class="section hidden">
            <!-- Header -->
            <header class="header">
                <div class="container">
                    <div class="header-content">
                        <div class="logo">
                            <i class="fas fa-coins"></i>
                            <h1>ChitFund Management</h1>
                        </div>
                        <nav class="nav">
                            <button class="nav-btn active" data-page="dashboard">
                                <i class="fas fa-tachometer-alt"></i> Dashboard
                            </button>
                            <button class="nav-btn" data-page="chits">
                                <i class="fas fa-list"></i> My Chits
                            </button>
                            <button class="nav-btn" data-page="create-chit">
                                <i class="fas fa-plus"></i> Create Chit
                            </button>
                            <button class="nav-btn" data-page="settings">
                                <i class="fas fa-cog"></i> Settings
                            </button>
                            <div class="mock-toggle-container">
                                <label class="mock-toggle">
                                    <input type="checkbox" id="mockDataToggle" checked>
                                    <span class="toggle-slider"></span>
                                    <span class="toggle-label">Mock Data</span>
                                </label>
                            </div>
                            <button class="nav-btn" id="logout-btn">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </button>
                        </nav>
                    </div>
                </div>
            </header>

            <!-- Main Content -->
            <main class="main-content">
                <div class="container">
                    <div id="connection-warning" class="error-message hidden" style="margin-bottom: 20px;"></div>
                    <div id="content-area">
                        <!-- Content will be loaded here -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chits.js"></script>
    <script src="js/utils.js"></script>
</body>
</html>
